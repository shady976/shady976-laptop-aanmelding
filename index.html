    function parseDate(str) {
      if (!str) return null;
      const s = String(str).trim();
      const m1 = s.match(/^(\d{1,2})[/-](\d{1,2})[/-](\d{4})$/);
      if (m1) return new Date(+m1[3], +m1[2]-1, +m1[1]);
      const m2 = s.match(/^(\d{4})[/-](\d{1,2})[/-](\d{1,2})/);
      if (m2) return new Date(+m2[1], +m2[2]-1, +m2[3]);
      const num = parseFloat(s);
      if (!isNaN(num) && num > 40000 && num < 50000)
        return new Date(Math.round((num - 25569) * 86400 * 1000));
      return null;
    }

    function monthsDiff(date) {
      const now = new Date();
      return (now.getFullYear() - date.getFullYear()) * 12 + (now.getMonth() - date.getMonth());

    // Empty, nan, or any plain text = allow registration
    function serialStatus(serial) {
      const s = String(serial||"").trim();
      if (s === "" || s === "nan") return "unknown";
      if (s === "000000") return "not_received";
      if (s === "111111") return "excluded";
      if (/^[A-Z0-9]{5,12}$/i.test(s)) return "received";
      return "unknown";
    }

    async function lookupPersonSupabase(voornaam, achternaam, dag, maand, jaar) {
  try {
    const res = await fetch(`${FUNCTIONS_URL}/check-person`, {
      method: "POST",

    // معالجة Rate Limit

      const data = await res.json();
      alert(data.error || "Te veel verzoeken. Probeer later opnieuw.");
      return null;
    }
    
    if (!res.ok) return null;
    const { matches } = await res.json();
    if (!matches || matches.length === 0) return { status:"none" };
    return lookupPerson(matches, voornaam, achternaam, dag, maand, jaar);
  } catch(e) {
    console.error("check-person fout:", e);
    return null;
  }
}

    function lookupPerson(rows, voornaam, achternaam, dag, maand, jaar) {
      const n = (s) => String(s||"").trim().toLowerCase().replace(/\s+/g," ");
      const matches = rows.filter(r =>
        n(r.voornaam) === n(voornaam) && n(r.achternaam) === n(achternaam) &&
        String(+(r.dag||"")) === String(+dag) && n(r.maand) === n(maand) &&
        String(r.jaar||"").replace(/\.0$/,"") === String(jaar)
      );
      if (matches.length === 0) return { status:"none" };

      // Check for manual exclusion first (111111)
      for (const r of matches) {
        if (serialStatus(r.serienummer) === "excluded")
          return { status:"excluded" };
      }

      // Check all matches — prioritize received status
      for (const r of matches) {
        const ss = serialStatus(r.serienummer);
        if (ss === "received") {
          const date = parseDate(r.uitdelen_datum);
          const ago  = date ? monthsDiff(date) : 999;
          return { status:"received", date, monthsAgo: ago };
        }
      }

      // Check for 000000 (selected but not received)
      for (const r of matches) {
        const ss = serialStatus(r.serienummer);
        if (ss === "not_received") {
          const date = parseDate(r.uitdelen_datum);
          if (!date) return { status:"none" };
          const ago = monthsDiff(date);
          return { status:"not_received", date, monthsAgo: ago };
        }
      }

      // All matches have unknown serial → allow
      return { status:"none" };
    }

    function parseXLSXFile(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const wb  = XLSX.read(ev.target.result, {type:"array"});
            const ws  = wb.Sheets[wb.SheetNames[0]];
            const raw = XLSX.utils.sheet_to_json(ws, {defval:""});
            const n   = (s) => String(s||"").trim().toLowerCase();
            const rows = raw.map(r => {
              const keys = Object.keys(r);
              const get  = (...names) => {
                for (const nm of names) {
                  const k = keys.find(k => n(k) === n(nm));
                  if (k !== undefined) return r[k];
                }
                return "";
              };
              return {
                voornaam:       get("Voornaam","voornaam"),
                achternaam:     get("Achternaam","achternaam"),
                dag:            get("Dag","dag"),
                maand:          get("Maand","maand"),
                jaar:           get("Jaar","jaar"),
                serienummer:    get("Serienummer","serienummer"),
                uitdelen_datum: get("Uitdelen Datum","uitdelen datum","uitdelen_datum"),
                adres:          get("Adres","adres"),
              };
            });
            resolve({ok:true, rows: rows.filter(r => String(r.voornaam).trim())});
          } catch(err) { resolve({ok:false, error:String(err)}); }
        };
        reader.readAsArrayBuffer(file);
      });
    }

    function exportCSV(rows) {
      // Use tab-separated values so Excel opens each field in its own column
      const SEP = "\t";
      const headers = [
        "Voornaam","Achternaam","Dag","Maand","Jaar",
        "Telefoonnummer","E-mail",
        "Straatnaam","Huisnummer","Postcode","Stadsdeel",
        "Stadspasnummer","Apparaat","Datum aanmelding"
      ];
      const esc = (v) => String(v||"").replace(/\t/g," ").replace(/\n/g," ");
      const lines = [headers.join(SEP)];
      rows.forEach(r => lines.push([
        r.voornaam,
        r.achternaam,
        r.geb_dag,
        r.geb_maand,
        r.geb_jaar,
        r.telefoon,
        r.email,
        r.straatnaam,
        r.huisnummer,
        (r.pc1&&r.pc2 ? r.pc1+" "+r.pc2 : ""),
        r.stadsdeel,
        r.stadspas,
        r.apparaat,
        r.timestamp
      ].map(esc).join(SEP)));
      const blob = new Blob(["\uFEFF"+lines.join("\r\n")],{type:"text/tab-separated-values;charset=utf-8"});
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement("a");
      a.href=url; a.download=`aanmeldingen_${new Date().toISOString().slice(0,10)}.tsv`;
      a.click(); URL.revokeObjectURL(url);
    }

    async function verifyAddress(straat, huisnr, postcode) {
      try {
        const pcClean     = postcode.replace(/\s/g,"").toUpperCase();
        const pcFormatted = pcClean.slice(0,4) + " " + pcClean.slice(4);
        const hnNum       = parseInt(huisnr.replace(/\D/g,""), 10);

        // Search by postcode + huisnummer only (most reliable in PDOK)
        const query = encodeURIComponent(pcFormatted + " " + hnNum);
        const url   = `https://api.pdok.nl/bzk/locatieserver/search/v3_1/free?q=${query}&fq=type:adres&fq=woonplaatsnaam:Amsterdam&rows=20`;
        const res   = await fetch(url);
        if (!res.ok) return {ok:false, error:"Verbinding met adresservice mislukt"};
        const docs  = (await res.json())?.response?.docs || [];

        // Accept if postcode + huisnummer match exactly
        const match = docs.find(d => {
          const dpc = (d.postcode||"").replace(/\s/g,"").toUpperCase();
          return dpc === pcClean && Number(d.huisnummer) === hnNum;
        });
        if (match) return {ok:true, formatted:{
          straat:   match.straatnaam     || straat,
          huisnr:   String(match.huisnummer || huisnr),
          postcode: match.postcode       || pcFormatted,
          plaats:   match.woonplaatsnaam || "",
        }};

        // Not found — search by street+number in Amsterdam only to suggest correct postcode
        const q2   = encodeURIComponent(straat + " " + hnNum + " Amsterdam");
        const url2 = `https://api.pdok.nl/bzk/locatieserver/search/v3_1/free?q=${q2}&fq=type:adres&fq=woonplaatsnaam:Amsterdam&rows=10`;
        const r2   = await fetch(url2);
        if (r2.ok) {
          const docs2 = (await r2.json())?.response?.docs || [];
          const exact = docs2.find(d => Number(d.huisnummer) === hnNum);
          if (exact?.postcode) return {ok:false, error:`Postcode klopt niet. Correcte postcode: ${exact.postcode}`};
        }
        return {ok:false, error:`"${pcFormatted} ${hnNum}" niet gevonden. Controleer postcode en huisnummer.`};
      } catch(err) {
        return {ok:false, error:"Adrescontrole niet beschikbaar (geen verbinding met PDOK)"};
      }
    }

    async function saveToSupabase(data, turnstileToken) {
  try {
    const res = await fetch(`${FUNCTIONS_URL}/save-aanmelding`, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": `Bearer ${ANON_KEY}` },
      body: JSON.stringify({ ...data, turnstileToken })
    });
    
    // معالجة Rate Limit
    if (res.status === 429) {
      const errData = await res.json();
      return { ok: false, message: errData.error || "Te veel aanmeldingen. Probeer over 10 minuten opnieuw.", rateLimit: true };
    }
    
    // معالجة فشل CAPTCHA
    if (res.status === 403) {
      const errData = await res.json();
      return { ok: false, message: errData.error || "CAPTCHA verificatie mislukt. Probeer opnieuw.", captchaFailed: true };
    }
    
    if (!res.ok) {
      const err = await res.text();
      return { ok: false, message: "Fout bij opslaan: " + err };
    }
    return { ok: true, message: "Opgeslagen in database" };
  } catch(e) {
    return { ok: false, message: "Verbinding mislukt: " + e.message };
  }
}

    // ── Intersolve Stadspas API ───────────────────────────────────────
    // ↓ Vervang deze waarden wanneer u de API-gegevens ontvangt van Intersolve
    const INTERSOLVE_API_URL = "JOUW_API_URL_HIER";  // ← API endpoint URL
    const INTERSOLVE_USERNAME = "JOUW_USERNAME_HIER"; // ← Gebruikersnaam
    const INTERSOLVE_PASSWORD = "JOUW_PASSWORD_HIER"; // ← Wachtwoord / API key
    const INTERSOLVE_ENABLED  = false; // ← Zet op TRUE wanneer API gereed is

    async function checkStadspas(stadspasNummer) {
      // Als API nog niet geconfigureerd is, sla verificatie over
      if (!INTERSOLVE_ENABLED) return { ok:true, status:"unknown", message:"" };

      try {
        const response = await fetch(INTERSOLVE_API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Basic " + btoa(INTERSOLVE_USERNAME + ":" + INTERSOLVE_PASSWORD),
          },
          body: JSON.stringify({ kaartnummer: stadspasNummer }),
        });

        if (!response.ok) return { ok:false, status:"error", message:"Verbinding met Stadspas verificatie mislukt" };

        const data = await response.json();

        // Pas onderstaande logica aan op basis van de API documentatie van Intersolve
        const status = data.status || data.kaartStatus || "";

        if (status === "geblokkeerd") {
          return { ok:false, status:"geblokkeerd", message:"Uw Stadspas is geblokkeerd. Neem contact op met de gemeente Amsterdam." };
        }
        if (status === "verlopen") {
          return { ok:false, status:"verlopen", message:"Uw Stadspas is verlopen. Vernieuw uw pas via de gemeente Amsterdam." };
        }
        if (status === "niet gevonden" || status === "ongeldig") {
          return { ok:false, status:"ongeldig", message:"Dit is geen geldig kaartnummer van de Stadspas Amsterdam." };
        }

        // Controleer op Cyberbank aanbieding
        const heeftCyberbankAanbieding = data.aanbiedingen?.some(a =>
          a.naam?.toLowerCase().includes("cyberbank")
        ) || false;

        if (!heeftCyberbankAanbieding) {
          return { ok:false, status:"geen_aanbieding", message:"Uw Stadspas heeft geen actieve Cyberbank aanbieding. U bent mogelijk al eerder geselecteerd." };
        }

        return { ok:true, status:"actief", message:"✅ Stadspas is actief en geldig" };

      } catch(err) {
        return { ok:false, status:"error", message:"Stadspas verificatie niet beschikbaar. Probeer opnieuw." };
      }
    }

    function App() {

      const fileRef              = useRef();
      const [cycleOpen,setCycleOpen]   = useState(false);
      const [cycleStart,setCycleStart] = useState("");
      const [cycleEnd,setCycleEnd]     = useState("");
      const [devices,setDevices]       = useState(DEFAULT_DEVICES);
      const [thankYou,setThankYou]     = useState(DEFAULT_THANK_YOU);
      const [consentText,setConsentText] = useState(DEFAULT_CONSENT_TEXT);
      const [criteria,setCriteria]       = useState(DEFAULT_CRITERIA);
      const [allowMultiAddr,setAllowMultiAddr] = useState(false);
      const [exemptAddrs,setExemptAddrs]       = useState([]);
      const [showAdmin,setShowAdmin]   = useState(false);
      const [settingsLoaded, setSettingsLoaded] = useState(false);
      const [settingsSaving, setSettingsSaving] = useState(false);
      const saveTimerRef = useRef(null);

      // ── تحميل الإعدادات من Supabase عند فتح الموقع ────────────────
      React.useEffect(() => {
        (async () => {
          try {
            const res = await fetch(`${FUNCTIONS_URL}/app-settings`, {
              method: "GET",
              headers: { "Content-Type": "application/json", "Authorization": `Bearer ${ANON_KEY}` },
            });
            if (!res.ok) return;
            const { settings } = await res.json();
            if (!settings) return;

            // تطبيق الإعدادات المحملة
            if (settings.cycle_open !== undefined)   setCycleOpen(settings.cycle_open === true || settings.cycle_open === "true");
            if (settings.cycle_start !== undefined)  setCycleStart(settings.cycle_start || "");
            if (settings.cycle_end !== undefined)    setCycleEnd(settings.cycle_end || "");
            if (settings.devices && Array.isArray(settings.devices)) setDevices(settings.devices);
            if (settings.thank_you)                  setThankYou(settings.thank_you);
            if (settings.consent_text)               setConsentText(settings.consent_text);
            if (settings.criteria && Array.isArray(settings.criteria)) setCriteria(settings.criteria);
            if (settings.allow_multi_addr !== undefined) setAllowMultiAddr(settings.allow_multi_addr === true || settings.allow_multi_addr === "true");
            if (settings.exempt_addrs && Array.isArray(settings.exempt_addrs)) setExemptAddrs(settings.exempt_addrs);
            if (settings.extra_pages1 && Array.isArray(settings.extra_pages1)) setExtraPages1(settings.extra_pages1);
            if (settings.extra_pages2 && Array.isArray(settings.extra_pages2)) setExtraPages2(settings.extra_pages2);

            setSettingsLoaded(true);
          } catch(e) {
            console.warn("Instellingen laden mislukt:", e);
            setSettingsLoaded(true); // ga toch door met defaults
          }
        })();
      }, []);

      // ── حفظ الإعدادات في Supabase (للأدمن فقط — مع debounce) ──────
      const saveSettings = React.useCallback(async (newSettings) => {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (!session) return; // فقط إذا كان الأدمن مسجّل دخول

        setSettingsSaving(true);
        try {
          await fetch(`${FUNCTIONS_URL}/app-settings`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Authorization": `Bearer ${session.access_token}`,
            },
            body: JSON.stringify({ settings: newSettings }),
          });
        } catch(e) {
          console.warn("Opslaan mislukt:", e);
        }
        setSettingsSaving(false);
      }, []);

      // دالة مساعدة: حفظ مع debounce (ننتظر 1.5 ثانية بعد آخر تغيير)
      const debouncedSave = React.useCallback((settings) => {
        if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
        saveTimerRef.current = setTimeout(() => saveSettings(settings), 1500);
      }, [saveSettings]);

      // Wrappers للـ setters تحفظ تلقائياً عند التغيير (للأدمن فقط)
      const setCycleOpenAndSave = (v) => {
        setCycleOpen(prev => {
          const newVal = typeof v === "function" ? v(prev) : v;
          debouncedSave({ cycle_open: newVal });
          return newVal;
        });
      };
      const setCycleStartAndSave = (v) => { setCycleStart(v); debouncedSave({ cycle_start: v }); };
      const setCycleEndAndSave = (v) => { setCycleEnd(v); debouncedSave({ cycle_end: v }); };
      const setDevicesAndSave = (v) => {
        const newVal = typeof v === "function" ? v(devices) : v;
        setDevices(newVal); debouncedSave({ devices: newVal });
      };
      const setThankYouAndSave = (v) => { setThankYou(v); debouncedSave({ thank_you: v }); };
      const setConsentTextAndSave = (v) => { setConsentText(v); debouncedSave({ consent_text: v }); };
      const setCriteriaAndSave = (v) => {
        const newVal = typeof v === "function" ? v(criteria) : v;
        setCriteria(newVal); debouncedSave({ criteria: newVal });
      };
      const setAllowMultiAddrAndSave = (v) => {
        setAllowMultiAddr(prev => {
          const newVal = typeof v === "function" ? v(prev) : v;
          debouncedSave({ allow_multi_addr: newVal });
          return newVal;
        });
      };
      const setExemptAddrsAndSave = (v) => {
        const newVal = typeof v === "function" ? v(exemptAddrs) : v;
        setExemptAddrs(newVal); debouncedSave({ exempt_addrs: newVal });
      };
      const setExtraPages1AndSave = (v) => {
        const newVal = typeof v === "function" ? v(extraPages1) : v;
        setExtraPages1(newVal); debouncedSave({ extra_pages1: newVal });
      };
      const setExtraPages2AndSave = (v) => {
        const newVal = typeof v === "function" ? v(extraPages2) : v;
        setExtraPages2(newVal); debouncedSave({ extra_pages2: newVal });
      };

      // Pre-form flow: "consent" → "criteria" → extraPages1 → "form"
      const [preStep,setPreStep] = useState("consent");
      const [consentAnswer,setConsentAnswer] = useState(null);
      const [criteriaAnswers,setCriteriaAnswers] = useState([null,null,null,null]);
      const [preError,setPreError] = useState("");

      const [extraPages2,setExtraPages2] = useState([]); // after apparaat, before review

      const [showReview,setShowReview] = useState(false); // review screen

      const upd = (f,v) => {
        setForm(p=>({...p,[f]:v}));

        if(["straatnaam","huisnummer"].includes(f)){
          setAddrOk(false); setAddrSt("idle"); setAddrMsg("");

          setAddrMsg("Vul eerst straatnaam, huisnummer en postcode in."); setAddrSt("error"); return;

        if(result.ok){
          setAddrOk(true); setAddrSt("ok");
          setAddrMsg(`✅ Adres bevestigd: ${result.formatted.straat} ${result.formatted.huisnr}, ${result.formatted.postcode} ${result.formatted.plaats}`);
          // Update pc1/pc2 from confirmed postcode
          if(result.formatted.postcode){
            const pc = result.formatted.postcode.replace(/\s/g,"").toUpperCase();
            upd("pc1", pc.slice(0,4));
            upd("pc2", pc.slice(4,6));
          }
        } else {
          setAddrOk(false); setAddrSt("error"); setAddrMsg(`❌ ${result.error}`);
        }
      };

      const next = async () => {
        if(!cycleOpen){ setBlocked({type:"cycle",message:"De aanmeldingsperiode is momenteel gesloten. Kom later terug."}); return; }
        let errs={};
        if(step===1){
          errs=v1(form);
          if(!Object.keys(errs).length){
            // Zoek in Supabase via Edge Function
            let result = { status:"none" };
            result = await lookupPersonSupabase(form.voornaam,form.achternaam,form.geb_dag,form.geb_maand,form.geb_jaar) || { status:"none" };

            // Manually excluded (111111)
            if(result.status==="excluded"){
              setBlocked({type:"excluded",message:"U heeft eerder al een apparaat ontvangen en komt niet in aanmerking voor een nieuw apparaat. Neem contact op met onze organisatie voor meer informatie."}); return;
            }

            if(result.status==="received" && result.monthsAgo<36){
              const ds=result.date?result.date.toLocaleDateString("nl-NL"):"onbekend";
              const eligible=result.date?new Date(result.date.getFullYear()+3,result.date.getMonth(),result.date.getDate()).toLocaleDateString("nl-NL"):"";
              setBlocked({type:"received_recent",message:`U heeft op ${ds} al een apparaat ontvangen. U kunt zich pas na ${eligible} opnieuw aanmelden.`}); return;
            }
            if(result.status==="not_received" && result.monthsAgo<6){
              const ds=result.date?result.date.toLocaleDateString("nl-NL"):"onbekend";
              const eligible=result.date?new Date(result.date.getFullYear(),result.date.getMonth()+6,result.date.getDate()).toLocaleDateString("nl-NL"):"";
              setBlocked({type:"not_received",message:`U bent op ${ds} geselecteerd maar heeft het apparaat niet opgehaald. U kunt zich pas na ${eligible} opnieuw aanmelden.`}); return;
            }
            const csDate=cycleStart?new Date(cycleStart):null;
            const ceDate=cycleEnd?new Date(cycleEnd):null;
            if(csDate&&ceDate&&db){
              const n=(s)=>String(s||"").trim().toLowerCase().replace(/\s+/g," ");
              const dup=db.rows.some(r=>{
                if(n(r.voornaam)!==n(form.voornaam)||n(r.achternaam)!==n(form.achternaam)) return false;
                const d=parseDate(r.uitdelen_datum);
                return d&&d>=csDate&&d<=ceDate;
              });
              if(dup){setBlocked({type:"same_cycle",message:"U heeft zich al aangemeld in de huidige aanmeldingsperiode. U kunt zich niet meerdere keren aanmelden per periode."}); return;}
            }
          }
        }
        else if(step===2) errs=v2(form);
        else if(step===3){
          errs=v3(form,addrOk);
          // Check address duplicate if no other errors and addrOk
          if(!Object.keys(errs).length && addrOk && !allowMultiAddr){
            const straatNorm = form.straatnaam.trim().toLowerCase();
            const huisNorm   = form.huisnummer.trim().toLowerCase();

            // Check if exempt
            const adresInput = straatNorm + " " + huisNorm;
            const isExempt = exemptAddrs.some(e => {
              const en = e.trim().toLowerCase();
              return en.length > 0 && adresInput.includes(en);
            });

            if(!isExempt){
              // Check DB: Adres column contains "Straatnaam Huisnummer"
              const dbDup = db ? db.rows.some(r => {
                const dbAdres = String(r.adres||"").trim().toLowerCase();
                if(!dbAdres) return false;
                return dbAdres.includes(straatNorm) && dbAdres.includes(huisNorm);
              }) : false;

              // Check current session
              const sessionDup = submissions.some(s =>
                s.straatnaam.trim().toLowerCase() === straatNorm &&
                s.huisnummer.trim().toLowerCase() === huisNorm
              );

              if(dbDup || sessionDup){
                setBlocked({type:"same_cycle",
                  message:`Er is al een aanmelding voor ${form.straatnaam} ${form.huisnummer}. Neem contact op als u denkt dat dit een fout is.`});
                return;
              }
            }
          }
        }
        else if(step===4){
          errs=v4(form);
          // If API enabled and stadspas not verified or failed → block
          if(!Object.keys(errs).length && INTERSOLVE_ENABLED){
            if(!stadspasStatus){ errs.stadspas="Controleer eerst uw Stadspas via de knop hieronder"; }
            else if(!stadspasStatus.ok){ errs.stadspas=stadspasStatus.message; }
          }
        }
        else if(step===5){
          errs=v5(form);
          if(!Object.keys(errs).length){
            // After apparaat → go to extra pages 2 (if any), then review
            if(extraPages2.length > 0){
              setPreStep("extra2"); setExtraPageIdx(0);
            } else {
              setPreStep("review");
            }
            return;
          }
        }
        if(Object.keys(errs).length){setErrors(errs);return;}
        setStep(s=>s+1);
      };

      const reset=()=>{setForm(EMPTY);setStep(1);setErrors({});setBlocked(null);setDone(false);setAddrOk(false);setAddrSt("idle");setAddrMsg("");setPreStep("consent");setConsentAnswer(null);setCriteriaAnswers([null,null,null,null]);setPreError("");setExtraPageIdx(0);setShowReview(false);setReviewConfirmed(false);setStadspasStatus(null);setStadspasChecking(false);};

      const [logoClickCount, setLogoClickCount] = useState(0);
      const logoClickTimerRef = useRef(null);
      
      const handleLogoClick = () => {
        // 5 quick clicks on logo opens admin login (hidden trigger)
        const newCount = logoClickCount + 1;
        setLogoClickCount(newCount);
        
        if (logoClickTimerRef.current) clearTimeout(logoClickTimerRef.current);
        logoClickTimerRef.current = setTimeout(() => setLogoClickCount(0), 2000);
        
        if (newCount >= 5) {
          setLogoClickCount(0);
          if (!adminAuth) openLogin();
        }
      };

      const CardHeader=()=>(
        <div style={{...C.header,position:"relative"}}>
          <div style={C.logoRow}>
            {/* Logo is now a hidden trigger — click 5 times to open admin login */}
            <span 
              onClick={handleLogoClick}
              style={{fontSize:34,cursor:"default",userSelect:"none"}}
              title=""
            >💻</span>
            <div><div style={C.orgName}>Apparaat aanvraag bij Cyberbank</div></div>
          </div>
          {/* Logout button — only visible when admin is logged in */}
          {adminAuth && (
            <button onClick={handleAdminLogout} style={{
              position:"absolute",top:8,right:10,
              background:"rgba(255,255,255,0.15)",border:"none",color:"#fff",
              fontSize:11,cursor:"pointer",padding:"4px 8px",borderRadius:6,
            }}>🔐 Uitloggen</button>
          )}
        </div>
      );

      // ── Supabase Auth Implementation (with MFA) ─────────────────────
      const [adminAuth,  setAdminAuth]  = useState(false);
      const [adminEmail, setAdminEmail] = useState("");
      const [showPwBox,  setShowPwBox]  = useState(false);
      const [loginStep,  setLoginStep]  = useState(1); // 1=email/pwd, 2=mfa, 3=mfa-enroll
      const [emailInput, setEmailInput] = useState("");
      const [pwInput,    setPwInput]    = useState("");
      const [totpInput,  setTotpInput]  = useState("");
      const [loginError, setLoginError] = useState("");
      const [authLoading, setAuthLoading] = useState(false);
      const [mfaFactorId, setMfaFactorId] = useState(null);
      const [mfaChallengeId, setMfaChallengeId] = useState(null);
      const [enrollQR, setEnrollQR] = useState(null);
      const [enrollSecret, setEnrollSecret] = useState(null);

      // Check existing session on mount
      React.useEffect(() => {
        (async () => {
          const { data: { session } } = await supabaseClient.auth.getSession();
          if (session) {
            // Check if MFA is verified for this session
            const { data: mfaData } = await supabaseClient.auth.mfa.getAuthenticatorAssuranceLevel();
            if (mfaData?.currentLevel === "aal2" || !mfaData?.nextLevel || mfaData?.nextLevel === "aal1") {
              // Either MFA is verified, or no MFA enrolled yet
              setAdminAuth(true);
              setAdminEmail(session.user.email || "");
              setShowAdmin(true);
            }
          }
        })();
      }, []);

      const handleStep1 = async () => {
        if (!emailInput.trim() || !pwInput.trim()) {
          setLoginError("Vul email en wachtwoord in");
          return;
        }
        setAuthLoading(true); setLoginError("");
        try {
          const { data, error } = await supabaseClient.auth.signInWithPassword({
            email: emailInput.trim(),
            password: pwInput,
          });
          if (error) {
            setLoginError(error.message === "Invalid login credentials" 
              ? "Onjuist email of wachtwoord" 
              : "Inlogfout: " + error.message);
            setAuthLoading(false);
            return;
          }

          // Check if user has MFA enrolled
          const { data: factors } = await supabaseClient.auth.mfa.listFactors();
          const totpFactor = factors?.totp?.find(f => f.status === "verified");

          if (totpFactor) {
            // MFA enrolled — challenge user
            const { data: challenge, error: chErr } = await supabaseClient.auth.mfa.challenge({
              factorId: totpFactor.id
            });
            if (chErr) {
              setLoginError("MFA fout: " + chErr.message);
              setAuthLoading(false);
              return;
            }
            setMfaFactorId(totpFactor.id);
            setMfaChallengeId(challenge.id);
            setLoginStep(2);
            setPwInput("");
            setLoginError("");
          } else {
            // No MFA yet — enroll now (mandatory for first login)
            const { data: enroll, error: enErr } = await supabaseClient.auth.mfa.enroll({
              factorType: "totp",
              friendlyName: "Cyberbank Admin"
            });
            if (enErr) {
              setLoginError("MFA setup fout: " + enErr.message);
              setAuthLoading(false);
              return;
            }
            setMfaFactorId(enroll.id);
            setEnrollQR(enroll.totp.qr_code);
            setEnrollSecret(enroll.totp.secret);
            setLoginStep(3);
            setPwInput("");
            setLoginError("");
          }
        } catch(e) {
          setLoginError("Verbindingsfout: " + e.message);
        }
        setAuthLoading(false);
      };

      const handleStep2 = async () => {
        if (totpInput.length !== 6) return;
        setAuthLoading(true); setLoginError("");
        try {
          const { data, error } = await supabaseClient.auth.mfa.verify({
            factorId: mfaFactorId,
            challengeId: mfaChallengeId,
            code: totpInput,
          });
          if (error) {
            setLoginError("Onjuiste code — probeer opnieuw");
            setTotpInput("");
            setAuthLoading(false);
            return;
          }
          // Successfully verified MFA
          const { data: { session } } = await supabaseClient.auth.getSession();
          setAdminAuth(true);
          setAdminEmail(session?.user?.email || "");
          setShowPwBox(false);
          setShowAdmin(true);
          setEmailInput(""); setPwInput(""); setTotpInput("");
          setLoginError(""); setLoginStep(1);
          setMfaFactorId(null); setMfaChallengeId(null);
        } catch(e) {
          setLoginError("Verificatie fout: " + e.message);
        }
        setAuthLoading(false);
      };

      const handleEnrollVerify = async () => {
        if (totpInput.length !== 6) return;
        setAuthLoading(true); setLoginError("");
        try {
          // Challenge first
          const { data: challenge, error: chErr } = await supabaseClient.auth.mfa.challenge({
            factorId: mfaFactorId
          });
          if (chErr) throw chErr;
          // Verify the code
          const { data, error } = await supabaseClient.auth.mfa.verify({
            factorId: mfaFactorId,
            challengeId: challenge.id,
            code: totpInput,
          });
          if (error) {
            setLoginError("Onjuiste code — controleer uw Authenticator app");
            setTotpInput("");
            setAuthLoading(false);
            return;
          }
          // Enrolled and verified successfully
          const { data: { session } } = await supabaseClient.auth.getSession();
          setAdminAuth(true);
          setAdminEmail(session?.user?.email || "");
          setShowPwBox(false);
          setShowAdmin(true);
          setEmailInput(""); setPwInput(""); setTotpInput("");
          setLoginError(""); setLoginStep(1);
          setMfaFactorId(null); setEnrollQR(null); setEnrollSecret(null);
        } catch(e) {
          setLoginError("Setup fout: " + e.message);
        }
        setAuthLoading(false);
      };

      const handleAdminLogout = async () => {
        await supabaseClient.auth.signOut();
        setAdminAuth(false); setAdminEmail(""); setShowAdmin(false);
        setLoginStep(1); setEmailInput(""); setPwInput(""); setTotpInput("");
        setLoginError(""); setShowPwBox(false);
        setMfaFactorId(null); setMfaChallengeId(null);
        setEnrollQR(null); setEnrollSecret(null);
      };

      const openLogin = () => {
        setShowPwBox(prev => {
          if(!prev){ 
            setLoginStep(1); setEmailInput(""); setPwInput(""); setTotpInput(""); 
            setLoginError(""); setMfaFactorId(null); setMfaChallengeId(null);
            setEnrollQR(null); setEnrollSecret(null);
          }
          return !prev;
        });
      };

      // ── Hidden admin access triggers ─────────────────────────────────
      // Trigger 1: Keyboard shortcut Ctrl+Shift+A
      // Trigger 2: URL hash #cb-mgmt-2026
      // Trigger 3: 5 quick clicks on logo (handled in handleLogoClick above)
      React.useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.ctrlKey && e.shiftKey && (e.key === "A" || e.key === "a")) {
            e.preventDefault();
            if (!adminAuth && !showPwBox) openLogin();
          }
        };
        
        const checkUrlHash = () => {
          if (window.location.hash === "#cb-mgmt-2026" && !adminAuth && !showPwBox) {
            openLogin();
            // Clear hash from URL for cleanliness
            history.replaceState(null, "", window.location.pathname);
          }
        };
        
        window.addEventListener("keydown", handleKeyDown);
        window.addEventListener("hashchange", checkUrlHash);
        checkUrlHash(); // Check on load
        
        return () => {
          window.removeEventListener("keydown", handleKeyDown);
          window.removeEventListener("hashchange", checkUrlHash);
        };
      }, [adminAuth, showPwBox]);

      return (
        <div style={C.page}>
          {/* Admin bar — only after login */}
          {adminAuth && (
            <div style={C.adminBar}>
              <span style={C.adminTag}>⚙ Beheer</span>
              <div style={C.adminMid}>
                {SUPABASE_ENABLED
                  ? <span style={C.dbOk}>✅ Supabase verbonden</span>
                  : <span style={C.dbWarn}>⚠ Supabase niet actief</span>
                }
                {adminEmail && <span style={{color:"#cbd5e1",fontSize:11,marginLeft:8}}>👤 {adminEmail}</span>}
              </div>

              <button style={{...C.adminBtn,background:showAdmin?"#7c3aed":"#4f46e5"}} onClick={()=>setShowAdmin(p=>!p)}>
                {showAdmin?"✕ Sluiten":"⚙ Instellingen"}
              </button>
              {settingsSaving && <span style={{color:"#fbbf24",fontSize:11}}>💾 Opslaan...</span>}
              {submissions.length>0&&<button style={{...C.adminBtn,background:"#16a34a"}} onClick={()=>exportCSV(submissions)}>📥 Export ({submissions.length})</button>}
            </div>
          )}

          {adminAuth && showAdmin && <AdminPanels {...{
            cycleOpen, setCycleOpen: setCycleOpenAndSave,
            cycleStart, setCycleStart: setCycleStartAndSave,
            cycleEnd, setCycleEnd: setCycleEndAndSave,
            devices, setDevices: setDevicesAndSave,
            thankYou, setThankYou: setThankYouAndSave,
            submissions,
            allowMultiAddr, setAllowMultiAddr: setAllowMultiAddrAndSave,
            exemptAddrs, setExemptAddrs: setExemptAddrsAndSave,
            consentText, setConsentText: setConsentTextAndSave,
            criteria, setCriteria: setCriteriaAndSave,
            extraPages1, setExtraPages1: setExtraPages1AndSave,
            extraPages2, setExtraPages2: setExtraPages2AndSave,
          }}/>}

          <div style={C.card}>
            <CardHeader/>
            {/* Login box inside card */}
            {showPwBox && !adminAuth && (
              <div style={{padding:"20px 24px",borderBottom:"1px solid #f1f5f9"}}>
                {loginStep===1 && (
                  <>
                    <div style={{fontSize:14,fontWeight:700,color:"#1e293b",marginBottom:4}}>🔐 Beheerderstoegang</div>
                    <div style={{fontSize:12,color:"#64748b",marginBottom:12}}>Stap 1 van 2 — Email en wachtwoord</div>
                    <div style={{display:"flex",flexDirection:"column",gap:8}}>
                      <input type="email" value={emailInput}
                        onChange={e=>{setEmailInput(e.target.value);setLoginError("");}}
                        onKeyDown={e=>e.key==="Enter"&&pwInput&&handleStep1()}
                        placeholder="Email" autoFocus
                        style={{...C.input,borderColor:loginError?"#ef4444":"#cbd5e1"}}/>
                      <div style={{display:"flex",gap:8}}>
                        <input type="password" value={pwInput}
                          onChange={e=>{setPwInput(e.target.value);setLoginError("");}}
                          onKeyDown={e=>e.key==="Enter"&&emailInput&&handleStep1()}
                          placeholder="Wachtwoord"
                          style={{...C.input,flex:1,borderColor:loginError?"#ef4444":"#cbd5e1"}}/>
                        <button onClick={handleStep1} disabled={authLoading||!emailInput||!pwInput} style={{
                          padding:"10px 16px",borderRadius:9,border:"none",
                          background:authLoading||!emailInput||!pwInput?"#94a3b8":"#1d4ed8",
                          color:"#fff",fontWeight:700,fontSize:14,cursor:authLoading||!emailInput||!pwInput?"default":"pointer",
                        }}>{authLoading?"⏳":"→"}</button>
                      </div>
                    </div>
                    {loginError&&<div style={{fontSize:12,color:"#ef4444",marginTop:6}}>⚠ {loginError}</div>}
                  </>
                )}
                {loginStep===2 && (
                  <>
                    <div style={{fontSize:14,fontWeight:700,color:"#1e293b",marginBottom:4}}>📱 Verificatiecode</div>
                    <div style={{fontSize:12,color:"#64748b",marginBottom:12}}>Stap 2 van 2 — Voer de 6-cijferige code in uit uw Authenticator app</div>
                    <div style={{display:"flex",gap:8}}>
                      <input type="text" value={totpInput}
                        onChange={e=>{setTotpInput(e.target.value.replace(/\D/g,"").slice(0,6));setLoginError("");}}
                        onKeyDown={e=>e.key==="Enter"&&totpInput.length===6&&handleStep2()}
                        placeholder="000000" maxLength={6} autoFocus
                        style={{...C.input,flex:1,textAlign:"center",fontSize:20,letterSpacing:6,
                          borderColor:loginError?"#ef4444":"#cbd5e1"}}/>
                      <button onClick={handleStep2} disabled={totpInput.length!==6||authLoading} style={{
                        padding:"10px 16px",borderRadius:9,border:"none",
                        background:totpInput.length===6&&!authLoading?"#1d4ed8":"#94a3b8",
                        color:"#fff",fontWeight:700,fontSize:14,cursor:totpInput.length===6&&!authLoading?"pointer":"default",
                      }}>{authLoading?"⏳":"✓"}</button>
                    </div>
                    {loginError&&<div style={{fontSize:12,color:"#ef4444",marginTop:6}}>⚠ {loginError}</div>}
                    <div style={{marginTop:10}}>
                      <button onClick={()=>{setLoginStep(1);setLoginError("");setTotpInput("");}} style={{
                        background:"none",border:"none",color:"#64748b",fontSize:12,cursor:"pointer",
                      }}>← Terug</button>
                    </div>
                  </>
                )}
                {loginStep===3 && (
                  <>
                    <div style={{fontSize:14,fontWeight:700,color:"#1e293b",marginBottom:4}}>🔒 Stel 2FA in (eenmalig)</div>
                    <div style={{fontSize:12,color:"#64748b",marginBottom:12}}>Scan de QR-code met uw Authenticator app (Google/Microsoft Authenticator), voer dan de 6-cijferige code in.</div>
                    {enrollQR && (
                      <div style={{textAlign:"center",marginBottom:12,padding:"12px",background:"#f8fafc",borderRadius:9,border:"1px solid #e2e8f0"}}>
                        <div dangerouslySetInnerHTML={{__html: enrollQR}} style={{display:"inline-block"}}/>
                        {enrollSecret && (
                          <div style={{fontSize:11,color:"#64748b",marginTop:8,fontFamily:"monospace",wordBreak:"break-all"}}>
                            Secret: {enrollSecret}
                          </div>
                        )}
                      </div>
                    )}
                    <div style={{display:"flex",gap:8}}>
                      <input type="text" value={totpInput}
                        onChange={e=>{setTotpInput(e.target.value.replace(/\D/g,"").slice(0,6));setLoginError("");}}
                        onKeyDown={e=>e.key==="Enter"&&totpInput.length===6&&handleEnrollVerify()}
                        placeholder="000000" maxLength={6} autoFocus
                        style={{...C.input,flex:1,textAlign:"center",fontSize:20,letterSpacing:6,
                          borderColor:loginError?"#ef4444":"#cbd5e1"}}/>
                      <button onClick={handleEnrollVerify} disabled={totpInput.length!==6||authLoading} style={{
                        padding:"10px 16px",borderRadius:9,border:"none",
                        background:totpInput.length===6&&!authLoading?"#16a34a":"#94a3b8",
                        color:"#fff",fontWeight:700,fontSize:14,cursor:totpInput.length===6&&!authLoading?"pointer":"default",
                      }}>{authLoading?"⏳":"Bevestig"}</button>
                    </div>
                    {loginError&&<div style={{fontSize:12,color:"#ef4444",marginTop:6}}>⚠ {loginError}</div>}
                    <div style={{marginTop:10}}>
                      <button onClick={handleAdminLogout} style={{
                        background:"none",border:"none",color:"#64748b",fontSize:12,cursor:"pointer",
                      }}>← Annuleren</button>
                    </div>
                  </>
                )}
              </div>
            )}
            {blocked ? <BlockedScreen blocked={blocked} onBack={reset}/> :
             !cycleOpen ? (
              <div style={C.center}>
                <div style={{fontSize:48,marginBottom:14}}>🔒</div>
                <div style={{fontSize:20,fontWeight:700,color:"#b45309",marginBottom:10}}>Aanmelding gesloten</div>
                <div style={{fontSize:15,color:"#374151",lineHeight:1.7}}>De aanmeldingsperiode is momenteel gesloten.<br/>Kom later terug voor de volgende periode.</div>
                {cycleStart&&cycleEnd&&<div style={{marginTop:16,fontSize:13,color:"#64748b"}}>Periode: {new Date(cycleStart).toLocaleDateString("nl-NL")} – {new Date(cycleEnd).toLocaleDateString("nl-NL")}</div>}
              </div>
             ) : done ? <SuccessView form={form} devices={devices} thankYou={thankYou} onReset={reset}/> :

             // ── Pre-form: Consent page ──
             preStep==="consent" ? (
              <div style={{padding:"32px 28px"}}>
                <div style={{fontSize:18,fontWeight:700,color:"#1e293b",marginBottom:16}}>📋 Toestemming gegevensverwerking</div>
                <div style={{fontSize:14,color:"#374151",lineHeight:1.8,marginBottom:24,whiteSpace:"pre-wrap"}}>{consentText}</div>
                <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:16}}>
                  {[{val:true,label:"✅ Ja, ik geef toestemming"},{val:false,label:"❌ Nee, ik geef geen toestemming"}].map(opt=>(
                    <button key={String(opt.val)} onClick={()=>{setConsentAnswer(opt.val);setPreError("");}} style={{
                      padding:"14px 20px",borderRadius:12,border:"2px solid",textAlign:"left",cursor:"pointer",fontSize:15,fontWeight:600,
                      borderColor:consentAnswer===opt.val?(opt.val?"#16a34a":"#dc2626"):"#e2e8f0",
                      background:consentAnswer===opt.val?(opt.val?"#f0fdf4":"#fff1f2"):"#fff",
                      color:consentAnswer===opt.val?(opt.val?"#15803d":"#dc2626"):"#374151",
                    }}>{opt.label}</button>
                  ))}
                </div>
                {preError&&<div style={{fontSize:13,color:"#ef4444",marginBottom:12}}>⚠ {preError}</div>}
                {consentAnswer===false&&(
                  <div style={{background:"#fff1f2",border:"1px solid #fecaca",borderRadius:10,padding:"14px",fontSize:14,color:"#dc2626",marginBottom:16}}>
                    Helaas kunt u niet verder zonder toestemming te geven voor de verwerking van uw gegevens.
                  </div>
                )}
                <button onClick={()=>{
                  if(consentAnswer===null){setPreError("Maak een keuze om verder te gaan.");return;}
                  if(consentAnswer===false) return;
                  setPreStep("criteria"); setPreError("");
                }} disabled={consentAnswer!==true} style={{
                  padding:"12px 28px",borderRadius:9,border:"none",fontWeight:700,fontSize:15,cursor:consentAnswer===true?"pointer":"default",
                  background:consentAnswer===true?"#1d4ed8":"#94a3b8",color:"#fff",
                }}>Volgende →</button>
              </div>
             ) :

             // ── Pre-form: Criteria page ──
             preStep==="criteria" ? (
              <div style={{padding:"32px 28px"}}>
                <div style={{fontSize:18,fontWeight:700,color:"#1e293b",marginBottom:8}}>✅ Kom jij in aanmerking?</div>
                <div style={{fontSize:14,color:"#64748b",marginBottom:20}}>Beantwoord alle vragen met 'Ja' om verder te gaan.</div>
                {criteria.map((q,i)=>(
                  <div key={i} style={{marginBottom:20}}>
                    <div style={{fontSize:14,fontWeight:600,color:"#1e293b",marginBottom:10}}>
                      {i+1}. {q}
                    </div>
                    <div style={{display:"flex",gap:10}}>
                      {["Ja","Nee"].map(opt=>{
                        const selected = criteriaAnswers[i]===(opt==="Ja");
                        const isCorrect = opt==="Ja"; // all must be Ja
                        return(
                          <button key={opt} onClick={()=>{
                            const updated=[...criteriaAnswers]; updated[i]=(opt==="Ja"); setCriteriaAnswers(updated); setPreError("");
                          }} style={{
                            padding:"10px 24px",borderRadius:9,border:"2px solid",cursor:"pointer",fontSize:14,fontWeight:700,
                            borderColor:selected?(isCorrect?"#16a34a":"#dc2626"):"#e2e8f0",
                            background:selected?(isCorrect?"#f0fdf4":"#fff1f2"):"#fff",
                            color:selected?(isCorrect?"#15803d":"#dc2626"):"#374151",
                          }}>{opt}</button>
                        );
                      })}
                    </div>
                    {criteriaAnswers[i]===false&&(
                      <div style={{fontSize:12,color:"#dc2626",marginTop:6}}>
                        ⚠ Helaas voldoet u niet aan deze voorwaarde.
                      </div>
                    )}
                  </div>
                ))}
                {preError&&<div style={{fontSize:13,color:"#ef4444",marginBottom:12}}>⚠ {preError}</div>}
                {criteriaAnswers.some(a=>a===false)&&(
                  <div style={{background:"#fff1f2",border:"1px solid #fecaca",borderRadius:10,padding:"14px",fontSize:14,color:"#dc2626",marginBottom:16}}>
                    Helaas komt u niet in aanmerking voor een apparaat van Cyberbank. Heeft u vragen? Neem contact op met onze organisatie.
                  </div>
                )}
                <div style={{display:"flex",gap:12,marginTop:8}}>
                  <button onClick={()=>{setPreStep("consent");setPreError("");}} style={{
                    padding:"12px 20px",borderRadius:9,border:"1.5px solid #e2e8f0",background:"#fff",color:"#475569",fontSize:14,fontWeight:600,cursor:"pointer",
                  }}>← Terug</button>
                  <button onClick={()=>{
                    if(criteriaAnswers.some(a=>a===null)){setPreError("Beantwoord alle vragen om verder te gaan.");return;}
                    if(criteriaAnswers.some(a=>a===false)){setPreError("U kunt niet verder omdat u niet aan alle voorwaarden voldoet.");return;}
                    if(extraPages1.length > 0){ setPreStep("extra1"); setExtraPageIdx(0); }
                    else { setPreStep("form"); }
                    setPreError("");
                  }} style={{
                    padding:"12px 28px",borderRadius:9,border:"none",fontWeight:700,fontSize:15,cursor:"pointer",
                    background:"#1d4ed8",color:"#fff",
                  }}>Verder met aanmelden →</button>
                </div>
              </div>
             ) :

             // ── Extra pages 1 (after criteria, before form) ──
             preStep==="extra1" ? (
              <ExtraPageScreen
                pages={extraPages1}
                idx={extraPageIdx}
                onNext={()=>{
                  if(extraPageIdx < extraPages1.length-1){ setExtraPageIdx(i=>i+1); }
                  else { setPreStep("form"); setExtraPageIdx(0); }
                }}
                onBack={()=>{
                  if(extraPageIdx > 0){ setExtraPageIdx(i=>i-1); }
                  else { setPreStep("criteria"); }
                }}
              />
             ) :

             // ── Extra pages 2 (after apparaat, before review) ──
             preStep==="extra2" ? (
              <ExtraPageScreen
                pages={extraPages2}
                idx={extraPageIdx}
                onNext={()=>{
                  if(extraPageIdx < extraPages2.length-1){ setExtraPageIdx(i=>i+1); }
                  else { setPreStep("review"); setExtraPageIdx(0); }
                }}
                onBack={()=>{
                  if(extraPageIdx > 0){ setExtraPageIdx(i=>i-1); }
                  else { setPreStep("form"); setStep(5); }
                }}
              />
             ) :

             // ── Review screen ──
             preStep==="review" ? (
              <ReviewScreen
                form={form}
                devices={devices}
                onConfirm={()=>setPreStep("submit")}
                onBack={()=>{
                  if(extraPages2.length > 0){ setPreStep("extra2"); setExtraPageIdx(extraPages2.length-1); }
                  else { setPreStep("form"); setStep(5); }
                }}
              />
             ) :

             // ── Submit screen ──
             preStep==="submit" ? (
  <SubmitScreen
    onSubmit={async (turnstileToken)=>{
      const dev=devices.find(d=>d.id===form.apparaat);
      const submission={...form,apparaat:dev?dev.label:form.apparaat,timestamp:new Date().toLocaleString("nl-NL")};
      // Sla op in Supabase
      const result = await saveToSupabase(submission, turnstileToken);
      if (!result.ok) {
        alert(result.message);
        return;
      }
      // Sla ook lokaal op in sessie
      setSubs(p=>[...p,submission]);
      setDone(true);
    }}
    onBack={()=>setPreStep("review")}
  />
             ) : (
              <>
                {cycleStart&&cycleEnd&&(
                  <div style={{background:"#f0fdf4",borderBottom:"1px solid #bbf7d0",padding:"8px 32px",fontSize:13,color:"#15803d",fontWeight:600}}>
                    📅 Aanmeldingsperiode: {new Date(cycleStart).toLocaleDateString("nl-NL")} – {new Date(cycleEnd).toLocaleDateString("nl-NL")}
                  </div>
                )}
                <div style={C.stepper}>
                  {STEPS.map((_,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center"}}>
                      <div style={{...C.dot,background:step>i+1?"#22c55e":step===i+1?"#1d4ed8":"#e2e8f0",color:step>=i+1?"#fff":"#94a3b8",transform:step===i+1?"scale(1.18)":"scale(1)"}}>{step>i+1?"✓":i+1}</div>
                      {i<STEPS.length-1&&<div style={{...C.line,background:step>i+1?"#22c55e":"#e2e8f0"}}/>}
                    </div>
                  ))}
                </div>
                <div style={C.stepMeta}>
                  <div style={C.stepTitle}>{STEPS[step-1].title}</div>
                  <div style={C.stepSub}>Stap {step} van {STEPS.length} — {STEPS[step-1].sub}</div>
                </div>
                <div style={C.body}>
                  {step===1&&<Step1 form={form} upd={upd} errors={errors}/>}
                  {step===2&&<Step2 form={form} upd={upd} errors={errors}/>}
                  {step===3&&<Step3 form={form} upd={upd} errors={errors} addrStatus={addrStatus} addrMsg={addrMsg} addrOk={addrOk} onCheck={checkAddress}/>}
                  {step===4&&<Step4 form={form} upd={upd} errors={errors} stadspasStatus={stadspasStatus} stadspasChecking={stadspasChecking} onCheckStadspas={handleCheckStadspas}/>}
                  {step===5&&<Step5 form={form} upd={upd} errors={errors} devices={devices}/>}
                </div>
                <div style={C.btnRow}>
                  {step>1&&<button style={C.backBtn} onClick={()=>{setStep(s=>s-1);setErrors({});}}>← Terug</button>}
                  {step===1&&<button style={C.backBtn} onClick={()=>{
                    if(extraPages1.length>0){setPreStep("extra1");setExtraPageIdx(extraPages1.length-1);}
                    else setPreStep("criteria");
                  }}>← Terug</button>}
                  <button style={C.nextBtn} onClick={next}>Volgende →</button>
                </div>
              </>
            )}
          </div>
        </div>
      );
    }

    // ── Extra page screen ─────────────────────────────────────────────
    function ExtraPageScreen({pages,idx,onNext,onBack}) {
      const page = pages[idx];
      if(!page) return null;
      return (
        <div style={{padding:"32px 28px"}}>
          {pages.length > 1 && (
            <div style={{fontSize:12,color:"#94a3b8",marginBottom:12}}>
              {idx+1} / {pages.length}
            </div>
          )}
          {page.title && (
            <div style={{fontSize:20,fontWeight:700,color:"#1e293b",marginBottom:16}}>{page.title}</div>
          )}
          <div style={{fontSize:14,color:"#374151",lineHeight:1.8,whiteSpace:"pre-wrap",marginBottom:28}}>
            {page.content}
          </div>
          <div style={{display:"flex",gap:12}}>
            <button style={C.backBtn} onClick={onBack}>← Terug</button>
            <button style={C.nextBtn} onClick={onNext}>Volgende →</button>
          </div>
        </div>
      );
    }

    // ── Review screen ─────────────────────────────────────────────────
    function ReviewScreen({form,devices,onConfirm,onBack}) {
      const dev = devices.find(d=>d.id===form.apparaat);
      const pc  = form.pc1&&form.pc2 ? form.pc1+" "+form.pc2 : "";
      const rows = [
        ["👤","Voornaam",    form.voornaam],
        ["👤","Achternaam",  form.achternaam],
        ["📅","Geboortedatum",`${form.geb_dag} ${form.geb_maand} ${form.geb_jaar}`],
        ["📱","Telefoon",    form.telefoon],
        ["📧","E-mail",      form.email],
        ["📍","Straatnaam",  form.straatnaam],
        ["🏠","Huisnummer",  form.huisnummer],
        ["📮","Postcode",    pc],
        ["🏙","Stadsdeel",   form.stadsdeel],
        ["🪪","Stadspas",    form.stadspas],
        ["💻","Apparaat",    dev?`${dev.icon} ${dev.label}`:"—"],
      ];
      return (
        <div style={{padding:"28px"}}>
          <div style={{fontSize:18,fontWeight:700,color:"#1e293b",marginBottom:6}}>👁 Controleer uw gegevens</div>
          <div style={{fontSize:14,color:"#64748b",marginBottom:20}}>
            Zijn alle gegevens correct? Controleer ze zorgvuldig voordat u verder gaat.
          </div>
          <div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:12,padding:"16px",marginBottom:20}}>
            {rows.map(([icon,label,val])=>(
              <div key={label} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid #f1f5f9",gap:12}}>
                <span style={{color:"#64748b",fontSize:13,flexShrink:0}}>{icon} {label}</span>
                <span style={{fontWeight:600,fontSize:13,textAlign:"right"}}>{val||"—"}</span>
              </div>
            ))}
          </div>
          <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:10,padding:"14px",fontSize:14,color:"#92400e",marginBottom:20}}>
            ⚠ Controleer of alle gegevens correct zijn. Na bevestiging kunt u ze niet meer wijzigen.
          </div>
          <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
            <button style={C.backBtn} onClick={onBack}>← Nee, ik wil iets aanpassen</button>
            <button style={C.nextBtn} onClick={onConfirm}>✅ Ja, alle gegevens zijn correct</button>
          </div>
        </div>
      );
    }

    // ── Submit screen ─────────────────────────────────────────────────
    function SubmitScreen({onSubmit,onBack}) {
  const [token, setToken] = useState("");
  const [verifying, setVerifying] = useState(false);
  const widgetRef = useRef(null);
  const widgetIdRef = useRef(null);
  
  React.useEffect(() => {
    // انتظر تحميل Turnstile API
    const checkTurnstile = setInterval(() => {
      if (window.turnstile && widgetRef.current && !widgetIdRef.current) {
        clearInterval(checkTurnstile);
        widgetIdRef.current = window.turnstile.render(widgetRef.current, {
          sitekey: TURNSTILE_SITE_KEY,
          callback: (t) => { setToken(t); setVerifying(false); },
          "error-callback": () => { setToken(""); setVerifying(false); },
          "expired-callback": () => { setToken(""); },
          "before-interactive-callback": () => { setVerifying(true); },
        });
      }
    }, 100);
    
    return () => {
      clearInterval(checkTurnstile);
      if (widgetIdRef.current && window.turnstile) {
        try { window.turnstile.remove(widgetIdRef.current); } catch(e){}
      }
    };
  }, []);
  
  const handleSubmit = () => {
    if (!token) {
      alert("Voltooi eerst de beveiligingscontrole.");
      return;
    }
    onSubmit(token);
  };
  
  return (
    <div style={{...C.center,padding:"40px 28px"}}>
      <div style={{fontSize:48,marginBottom:16}}>📤</div>
      <div style={{fontSize:20,fontWeight:700,color:"#1e293b",marginBottom:12}}>Aanmelding versturen</div>
      <div style={{fontSize:15,color:"#374151",lineHeight:1.7,marginBottom:24}}>
        Uw gegevens zijn gecontroleerd en klaar om te worden verstuurd.<br/>
        Voltooi de beveiligingscontrole hieronder en druk op verzenden.
      </div>
      
      {/* Turnstile widget */}
      <div style={{display:"flex",justifyContent:"center",marginBottom:24}}>
        <div ref={widgetRef}></div>
      </div>
      
      <div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}>
        <button style={C.backBtn} onClick={onBack}>← Terug</button>
        <button onClick={handleSubmit} disabled={!token || verifying} style={{
          padding:"14px 32px",borderRadius:12,border:"none",
          background: token ? "linear-gradient(135deg,#16a34a,#22c55e)" : "#94a3b8",
          color:"#fff",fontSize:16,fontWeight:700,cursor: token ? "pointer" : "default",
          boxShadow: token ? "0 4px 16px rgba(22,163,74,0.3)" : "none",
          opacity: verifying ? 0.7 : 1,
        }}>
          {verifying ? "⏳ Verifiëren..." : token ? "🚀 Aanmelding indienen" : "🔒 Voltooi eerst de controle"}
        </button>
      </div>
    </div>
  );
}

    const C={
      page:{minHeight:"100vh",background:"linear-gradient(135deg,#f0f4ff,#e8f0fe 50%,#f0f0ff)",display:"flex",flexDirection:"column",alignItems:"center",padding:"0 16px 48px",fontFamily:"'Segoe UI',system-ui,sans-serif"},
      adminBar:{width:"100%",maxWidth:680,background:"#0f172a",borderRadius:"0 0 16px 16px",padding:"10px 18px",display:"flex",alignItems:"center",flexWrap:"wrap",gap:10,marginBottom:16},
      adminTag:{color:"#64748b",fontSize:13,fontWeight:600,whiteSpace:"nowrap"},
      adminMid:{flex:1,display:"flex",alignItems:"center",flexWrap:"wrap",gap:8},
      dbOk:{color:"#86efac",fontSize:12,fontWeight:600},dbErr:{color:"#fca5a5",fontSize:12},
      dbLoad:{color:"#93c5fd",fontSize:12},dbWarn:{color:"#fcd34d",fontSize:12},
      adminBtn:{padding:"7px 13px",borderRadius:8,border:"none",background:"#2563eb",color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"},
      panel:{width:"100%",maxWidth:680,background:"#fff",borderRadius:16,boxShadow:"0 8px 32px rgba(0,0,0,0.1)",marginBottom:16,overflow:"hidden"},
      devRow:{display:"flex",alignItems:"center",gap:10,marginBottom:10},
      card:{background:"#fff",borderRadius:20,boxShadow:"0 24px 64px rgba(0,0,0,0.1)",width:"100%",maxWidth:680,overflow:"hidden"},
      header:{background:"linear-gradient(135deg,#1d4ed8,#3b82f6)",padding:"24px 32px"},
      logoRow:{display:"flex",alignItems:"center",gap:14},
      orgName:{fontSize:21,fontWeight:700,color:"#fff",letterSpacing:-0.5},
      orgSub:{fontSize:13,color:"rgba(255,255,255,0.78)",marginTop:3},
      stepper:{display:"flex",alignItems:"center",justifyContent:"center",padding:"20px 32px 0"},
      dot:{width:32,height:32,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:13,transition:"all .3s",flexShrink:0},
      line:{width:24,height:3,transition:"background .3s"},
      stepMeta:{textAlign:"center",padding:"10px 32px 0"},
      stepTitle:{fontSize:19,fontWeight:700,color:"#1e293b"},
      stepSub:{fontSize:12,color:"#64748b",marginTop:3},
      body:{padding:"20px 32px 8px"},
      two:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14},
      label:{display:"block",fontSize:13,fontWeight:600,color:"#374151",marginBottom:5},
      hint:{fontSize:12,color:"#6b7280",marginBottom:5},
      input:{width:"100%",padding:"10px 13px",borderRadius:9,border:"1.5px solid #cbd5e1",fontSize:15,color:"#1e293b",outline:"none",background:"#f8fafc",boxSizing:"border-box"},
      subLabel:{textAlign:"center",fontSize:11,color:"#94a3b8",marginTop:4},
      err:{fontSize:12,color:"#ef4444",marginTop:5},
      counter:{fontSize:12,marginTop:4,textAlign:"right"},
      info:{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:9,padding:"11px 13px",fontSize:13,color:"#1d4ed8",marginTop:8},
      btnRow:{display:"flex",gap:12,padding:"14px 32px 26px",justifyContent:"flex-end"},
      backBtn:{padding:"11px 20px",borderRadius:9,border:"1.5px solid #e2e8f0",background:"#fff",color:"#475569",fontSize:14,fontWeight:600,cursor:"pointer"},
      nextBtn:{padding:"11px 24px",borderRadius:9,border:"none",background:"linear-gradient(135deg,#1d4ed8,#3b82f6)",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 14px rgba(29,78,216,0.3)"},
      center:{padding:"32px 32px",textAlign:"center"},
      summary:{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:12,padding:"14px 16px",marginBottom:16,textAlign:"left"},
      sumRow:{display:"flex",justifyContent:"space-between",gap:12,padding:"6px 0",borderBottom:"1px solid #f1f5f9"},
    };

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App/>);
  </script>
</body>
</html>
